name: Backfill Historic Picks + Results

# This workflow only runs when you click "Run workflow" in the Actions tab.
# It walks the git history of docs/index.html, reconstructs picks/{date}.json
# files for every past slate, grades them against the MLB Stats API box scores,
# and commits both picks/ and results/ back to main. Safe to re-run — it skips
# any date that's already been graded.

on:
  workflow_dispatch:

permissions:
  contents: write   # so the job can commit picks/ and results/ back to main

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repo with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need ALL commits so the script can walk git log

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run backfill
        run: python backfill_results.py

      - name: Commit picks + results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ -d picks ];   then git add picks;   fi
          if [ -d results ]; then git add results; fi

          if git diff --cached --quiet; then
            echo "No new files to commit — nothing to backfill."
          else
            git commit \
              -m "Backfill picks + results $(date -u +%Y-%m-%d)" \
              -m "[skip ci]"
            git push
          fi
