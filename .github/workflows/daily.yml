name: MLB Prop Edge — Daily Email

on:
  schedule:
    # 12:00 UTC = 8:00 AM Eastern Daylight Time (EDT, summer)
    #            = 7:00 AM Eastern Standard Time (EST, winter)
    # MLB regular season runs ~April–Oct (EDT), so this gives you 8 AM ET on game days.
    # By 8 AM ET, some morning/early-afternoon lineups have posted; the rest still
    # show "TBD" but the Odds API gives us real lines for everyone with prop markets.
    - cron: "0 12 * * *"
  workflow_dispatch:  # lets you trigger a run manually from the Actions tab

permissions:
  contents: write  # needed so the workflow can commit docs/index.html back to main

jobs:
  send-email:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run daily email script
        env:
          RESEND_API_KEY:  ${{ secrets.RESEND_API_KEY }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          ODDS_API_KEY:    ${{ secrets.ODDS_API_KEY }}
        run: python daily_email.py

      - name: Commit dashboard, picks, and results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Stage whichever of these exist this run
          if [ -f docs/index.html ]; then git add docs/index.html; fi
          if [ -d picks ];   then git add picks;   fi
          if [ -d results ]; then git add results; fi

          if git diff --cached --quiet; then
            echo "Nothing new to commit."
          else
            git commit \
              -m "Update dashboard / picks / results $(date -u +%Y-%m-%d)" \
              -m "[skip ci]"
            git push
          fi
