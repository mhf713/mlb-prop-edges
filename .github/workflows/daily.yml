name: MLB Prop Edge — Daily Email

on:
  schedule:
    # 12:00 UTC = 8:00 AM Eastern Daylight Time (EDT, summer)
    #            = 7:00 AM Eastern Standard Time (EST, winter)
    # MLB regular season runs ~April–Oct (EDT), so this gives you 8 AM ET on game days.
    - cron: "0 12 * * *"
  workflow_dispatch:  # lets you trigger a run manually from the Actions tab

permissions:
  contents: write  # needed so the workflow can commit docs/index.html back to main

jobs:
  send-email:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run daily email script
        env:
          RESEND_API_KEY:  ${{ secrets.RESEND_API_KEY }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python daily_email.py

      - name: Commit dashboard to docs/
        run: |
          if [ -f docs/index.html ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add docs/index.html
            if git diff --cached --quiet; then
              echo "No dashboard changes to commit."
            else
              git commit -m "Update dashboard $(date -u +%Y-%m-%d)" -m "[skip ci]"
              git push
            fi
          else
            echo "docs/index.html not produced (no games or script error) — skipping commit."
          fi
